<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#04070f">
<title>SOU · Painel dos Funis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;700;800&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#04070f; --panel:#0a1020; --panel2:#0d1526;
  --line:rgba(120,160,255,.10); --txt:#eef3ff; --dim:#7d8cab;
  --blue:#2f7bff; --cyan:#27d3f5; --green:#2ee56b; --amber:#ffb020;
  --red:#ff4d5e; --violet:#9d6bff; --orange:#ff8a3d; --gold:#ffcc4d;
  --num:'Big Shoulders Display',sans-serif; --body:'Archivo',sans-serif;
  --ev-panel:#1d1210; --ev-panel2:#140b09; --ev-line:rgba(255,150,90,.16);
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--txt);font-family:var(--body);min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 40% at 15% -5%, rgba(47,123,255,.13), transparent 60%),
    radial-gradient(ellipse 55% 35% at 95% 105%, rgba(46,229,107,.07), transparent 60%),
    radial-gradient(ellipse 45% 30% at 85% -5%, rgba(157,107,255,.06), transparent 60%);}
a{color:inherit;text-decoration:none}
button{font-family:var(--body)}

/* ---------- header ---------- */
header{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:12px;
  padding:14px 16px;background:rgba(4,7,15,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.brand{font-family:var(--num);font-weight:800;font-size:22px;letter-spacing:.12em;color:var(--blue);white-space:nowrap}
.brand em{font-style:normal;color:var(--txt)}
#back{display:none;background:rgba(125,140,171,.12);border:1px solid var(--line);border-radius:10px;
  color:var(--txt);font-size:18px;line-height:1;padding:8px 14px;cursor:pointer}
#back.show{display:block}
.hd-right{margin-left:auto;display:flex;align-items:center;gap:10px}
#upd{font-size:12px;color:var(--dim);white-space:nowrap}
#refresh{background:rgba(39,211,245,.1);border:1px solid rgba(39,211,245,.3);border-radius:10px;
  color:var(--cyan);font-size:16px;line-height:1;padding:8px 12px;cursor:pointer}
#refresh.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#sdot{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
#sdot.err{background:var(--red);box-shadow:0 0 8px var(--red)}

main{position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:18px 16px 60px}

/* ---------- hero ---------- */
.hero{background:linear-gradient(150deg,#0e1c3d,#0a1020 65%);border:1px solid rgba(47,123,255,.25);
  border-radius:18px;padding:22px 20px;margin-bottom:20px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 80% at 85% 20%, rgba(47,123,255,.18), transparent 60%)}
.hero h1{font-family:var(--num);font-weight:800;font-size:26px;letter-spacing:.14em;text-transform:uppercase}
.hero h1 span{color:var(--blue)}
.hero .sub{color:var(--dim);font-size:13px;margin-top:2px}
.hero-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:18px;position:relative;z-index:1}
.hstat .h-lbl{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
.hstat .h-v{font-family:var(--num);font-weight:800;font-size:34px;line-height:1.1;font-variant-numeric:tabular-nums}

/* ---------- layout home ---------- */
.home-grid{display:flex;flex-direction:column;gap:22px}
h2.sec{font-family:var(--num);font-weight:700;font-size:18px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);
  margin-bottom:12px;display:flex;align-items:center;gap:8px}
.funis{display:grid;grid-template-columns:1fr;gap:12px}

/* ---------- card de funil ---------- */
.fcard{display:block;background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);
  border-left:4px solid var(--blue);border-radius:14px;padding:16px;transition:.2s;cursor:pointer}
.fcard:active{transform:scale(.985)}
.fcard.evento{border-left-color:var(--orange);background:linear-gradient(160deg,var(--ev-panel),var(--ev-panel2));border-color:var(--ev-line);border-left-color:var(--orange)}
.fcard .f-top{display:flex;align-items:center;gap:8px}
.fcard .f-name{font-family:var(--num);font-weight:700;font-size:20px;letter-spacing:.04em;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fcard .f-badge{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:4px 8px;border-radius:7px;white-space:nowrap}
.fcard .f-badge.perp{color:var(--cyan);background:rgba(39,211,245,.1);border:1px solid rgba(39,211,245,.3)}
.fcard .f-badge.ev{color:var(--orange);background:rgba(255,138,61,.1);border:1px solid rgba(255,138,61,.35)}
.fcard .f-arrow{color:var(--dim);font-size:20px}
.fcard .f-nums{display:flex;gap:18px;margin-top:12px;align-items:flex-end;flex-wrap:wrap}
.fcard .fn .k{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
.fcard .fn .v{font-family:var(--num);font-weight:800;font-size:26px;line-height:1.1;font-variant-numeric:tabular-nums}
.fcard .spark{margin-left:auto;align-self:center}
.good{color:var(--green)}.warn{color:var(--amber)}.bad{color:var(--red)}

/* ---------- feed ---------- */
.feed{background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:14px;padding:14px}
.feed .item{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--line);font-size:14px}
.feed .item:last-child{border-bottom:none}
.feed .ic{font-size:17px;width:24px;text-align:center}
.feed .who{font-weight:700}
.feed .what{color:var(--dim);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.feed .when{color:var(--dim);font-size:12px;white-space:nowrap}
.feed .item.elite .who,.feed .item.elite .what{color:var(--gold)}

/* ---------- detalhe ---------- */
.det{display:flex;flex-direction:column;gap:22px}
.det-hero{border-radius:18px;padding:18px 20px;border:1px solid rgba(47,123,255,.25);
  background:linear-gradient(150deg,#0e1c3d,#0a1020 65%)}
.det-hero.evento{border-color:rgba(255,138,61,.35);background:linear-gradient(150deg,#2b1409,#140b09 65%)}
.det-hero h1{font-family:var(--num);font-weight:800;font-size:24px;letter-spacing:.06em}
.det-hero .sub{color:var(--dim);font-size:13px;margin-top:2px}
.kgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.kpi{background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:13px;
  padding:12px 14px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--ac,var(--blue))}
.evento .kpi{background:linear-gradient(160deg,var(--ev-panel),var(--ev-panel2));border-color:var(--ev-line)}
.kpi .lbl{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--dim)}
.kpi .v{font-family:var(--num);font-weight:800;font-size:32px;line-height:1.15;font-variant-numeric:tabular-nums;margin-top:4px}
.kpi .a{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-top:6px;border-top:1px solid var(--line);padding-top:6px}
.kpi .a b{color:var(--txt);font-family:var(--num);font-size:16px;font-weight:700}

/* funil de conversão em barras */
.steps{display:flex;flex-direction:column;gap:8px}
.step{position:relative;background:rgba(125,140,171,.08);border-radius:9px;overflow:hidden;padding:10px 12px}
.step .bar{position:absolute;inset:0;background:linear-gradient(90deg,var(--c1),var(--c2));opacity:.85;border-radius:9px;
  transform-origin:left;width:var(--w)}
.step .in{position:relative;display:flex;align-items:baseline;gap:10px}
.step .s-lbl{font-size:13px;font-weight:600;flex:1;min-width:0}
.step .s-v{font-family:var(--num);font-weight:800;font-size:20px;font-variant-numeric:tabular-nums}
.step .s-p{font-size:12px;color:rgba(255,255,255,.75);width:110px;text-align:right}

/* iscas */
.igrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.isca{background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:13px;padding:12px 14px;border-top:3px solid var(--ac)}
.isca h4{font-family:var(--num);font-weight:700;font-size:17px;letter-spacing:.04em}
.isca .rows{margin-top:8px;display:flex;flex-direction:column;gap:5px}
.isca .r{display:flex;justify-content:space-between;font-size:13px}
.isca .r .k{color:var(--dim)}
.isca .r .w{font-family:var(--num);font-weight:700;font-size:16px;font-variant-numeric:tabular-nums}

/* gráfico + semana */
.card{background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:14px;padding:14px}
.evento .card{background:linear-gradient(160deg,var(--ev-panel),var(--ev-panel2));border-color:var(--ev-line)}
.card h3{font-size:12px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.chart-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.chart-scroll svg{display:block;min-width:560px;width:100%;height:auto}
.wgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.wcard{background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);border-left:4px solid var(--ac,var(--blue));
  border-radius:12px;padding:12px 14px;display:flex;flex-direction:column;gap:2px}
.evento .wcard{background:linear-gradient(160deg,var(--ev-panel),var(--ev-panel2));border-color:var(--ev-line);border-left-color:var(--ac)}
.wcard .k{font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
.wcard .v{font-family:var(--num);font-weight:800;font-size:26px;font-variant-numeric:tabular-nums}

/* ---------- filtro de período ---------- */
.fbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.chip{background:rgba(125,140,171,.1);border:1px solid var(--line);border-radius:20px;color:var(--dim);
  font-size:13px;font-weight:600;padding:7px 14px;cursor:pointer;transition:.15s}
.chip.on{background:rgba(39,211,245,.14);border-color:var(--cyan);color:var(--cyan)}
.evento .chip.on{background:rgba(255,138,61,.14);border-color:var(--orange);color:var(--orange)}
.frange{display:flex;align-items:center;gap:6px;color:var(--dim)}
.frange input{background:var(--panel2);border:1px solid var(--line);border-radius:9px;color:var(--txt);
  font-family:var(--body);font-size:13px;padding:6px 8px;color-scheme:dark}
.fdesc{font-size:12px;color:var(--dim);margin-left:auto}
.cpa-note{font-size:12px;color:var(--amber);margin-top:8px;line-height:1.4}

/* ---------- tabela de variantes/páginas ---------- */
.vwrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.vtable{width:100%;min-width:560px;border-collapse:collapse;font-size:14px}
.vtable th{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);
  text-align:right;padding:8px 10px;border-bottom:1px solid var(--line)}
.vtable th:first-child{text-align:left}
.vtable td{padding:10px;border-bottom:1px solid var(--line);text-align:right;
  font-family:var(--num);font-weight:700;font-size:17px;font-variant-numeric:tabular-nums}
.vtable td:first-child{text-align:left;font-family:var(--body);font-weight:700;font-size:14px}
.vtable tr:last-child td{border-bottom:none}
.vtag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.08em;padding:2px 7px;border-radius:6px;margin-left:6px;vertical-align:middle}
.vtag.top{color:var(--green);background:rgba(46,229,107,.12);border:1px solid rgba(46,229,107,.35)}

/* ---------- overlay ---------- */
#overlay{position:fixed;inset:0;z-index:9;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;
  background:rgba(4,7,15,.96);text-align:center;padding:8vw}
#overlay.show{display:flex}
#overlay h2{font-family:var(--num);font-size:28px;letter-spacing:.1em}
#overlay p{color:var(--dim);font-size:15px;max-width:520px;line-height:1.5}

/* ---------- responsivo ---------- */
@media(min-width:700px){
  .hero-grid{grid-template-columns:repeat(5,1fr)}
  .funis{grid-template-columns:repeat(2,1fr)}
  .kgrid{grid-template-columns:repeat(4,1fr)}
  .igrid{grid-template-columns:repeat(4,1fr)}
  .wgrid{grid-template-columns:repeat(5,1fr)}
  .hero h1{font-size:32px}
}
@media(min-width:1100px){
  .home-grid{display:grid;grid-template-columns:1fr 340px;align-items:start}
  .home-left{display:flex;flex-direction:column;gap:22px}
  .home-feed{position:sticky;top:76px}
}
</style>
</head>
<body>
<header>
  <button id="back" title="Voltar">‹</button>
  <a class="brand" id="home-link">SOU<em>·DATA</em></a>
  <div class="hd-right">
    <span id="sdot"></span>
    <span id="upd">carregando…</span>
    <button id="refresh" title="Atualizar agora">⟳</button>
  </div>
</header>
<main id="main"></main>

<div id="overlay">
  <h2>AGUARDANDO DADOS</h2>
  <p id="overlay-msg">Abra o painel com o link completo que contém a chave de acesso (…?k=CHAVE).</p>
</div>

<script>
'use strict';
/* ================= CONFIG ================= */
const API = 'https://dqpxugdhlgafvddavzzp.supabase.co/functions/v1/dashboard-app';
const FETCH_MS = 5*60*1000;
const qs = new URLSearchParams(location.search);
const KEY  = qs.get('k') || '';
const DEMO = qs.has('demo');
const NAMES_ISCA = {plano_quiz:'Plano Quizz', plano_pagina:'Plano Página', mapas:'Mapas Mentais', raiox:'Raio X'};
const AC_ISCA = {plano_quiz:'var(--violet)', plano_pagina:'var(--green)', mapas:'var(--blue)', raiox:'var(--orange)'};

/* ================= helpers ================= */
const $ = id => document.getElementById(id);
const fmtI = n => (n??0).toLocaleString('pt-BR');
const fmtR = n => 'R$ ' + (n??0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtRk = n => { n=n??0; return n>=100000 ? 'R$ '+(n/1000).toLocaleString('pt-BR',{maximumFractionDigits:0})+' mil' : (n>=10000 ? 'R$ '+(n/1000).toLocaleString('pt-BR',{maximumFractionDigits:1})+' mil' : fmtR(n)); };
const pct = (a,b) => b>0 ? (100*a/b).toLocaleString('pt-BR',{maximumFractionDigits:1})+'%' : '—';
const fmtX = r => r==null ? '—' : r.toLocaleString('pt-BR',{maximumFractionDigits:2})+'x';
const roiCol = r => r==null ? 'var(--dim)' : (r>=1 ? 'var(--green)' : (r>=0.7 ? 'var(--amber)' : 'var(--red)'));
const esc = s => String(s??'').replace(/[<>&"]/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
const MINUSC = new Set(['de','da','do','das','dos','e']);
const titulo = s => String(s??'').toLowerCase().split(/\s+/).map(w=>MINUSC.has(w)?w:(w.length<=3&&/^[a-z0-9-]+$/.test(w)&&s.includes(w.toUpperCase())?w.toUpperCase():w.charAt(0).toUpperCase()+w.slice(1))).join(' ');
function tempoRel(iso){
  const s = Math.max(0,(Date.now()-new Date(iso).getTime())/1000);
  if(s<90) return 'agora';
  if(s<3600) return 'há '+Math.round(s/60)+' min';
  if(s<86400) return 'há '+Math.round(s/3600)+' h';
  return 'há '+Math.round(s/86400)+' d';
}

/* ================= período ================= */
let PER = {tipo:'tudo', ini:null, fim:null};
const hojeBRT = () => new Date().toLocaleDateString('en-CA',{timeZone:'America/Sao_Paulo'});
function addDias(d,n){const t=new Date(d+'T12:00:00Z');t.setUTCDate(t.getUTCDate()+n);return t.toISOString().slice(0,10)}
function rangePer(){
  const h = hojeBRT();
  switch(PER.tipo){
    case 'hoje':   return {ini:h, fim:h};
    case '7d':     return {ini:addDias(h,-6),  fim:h};
    case '14d':    return {ini:addDias(h,-13), fim:h};
    case '30d':    return {ini:addDias(h,-29), fim:h};
    case 'custom': {
      // só início → até hoje; só fim → desde o primeiro dia com dados
      let ini = PER.ini || minDia(), fim = PER.fim || h;
      if(ini > fim){ const a = ini; ini = fim; fim = a; }
      return {ini, fim};
    }
    default:       return null;
  }
}
window.setPer = t => {PER.tipo=t; route();};
// Menor dia com dado no banco — limita o calendário e serve de início padrão
function minDia(){
  const s = (DATA && DATA.serie) || [];
  return s.length ? s.reduce((m,x)=>x.dia<m?x.dia:m, s[0].dia) : '2026-01-01';
}
// Aceita só datas completas e dentro do intervalo com dados; ignora anos
// parciais (digitar "2026" dispara change com ano 0002 no meio da digitação)
window.setPerData = (campo,val) => {
  if(!val || val < minDia() || val > hojeBRT()) return;
  PER[campo] = val;
  PER.tipo = 'custom';
  if(PER.ini && PER.fim && PER.ini > PER.fim){ const a = PER.ini; PER.ini = PER.fim; PER.fim = a; }
  route();
};
const dmy = d => d ? d.slice(8,10)+'/'+d.slice(5,7) : '';
function filtroHTML(){
  const r = rangePer();
  const chips = [['tudo','Tudo'],['hoje','Hoje'],['7d','7 dias'],['14d','14 dias'],['30d','30 dias'],['custom','Datas…']];
  return `<div class="fbar">
    ${chips.map(([t,l])=>`<button class="chip ${PER.tipo===t?'on':''}" onclick="setPer('${t}')">${l}</button>`).join('')}
    ${PER.tipo==='custom'?`<div class="frange">
      <input type="date" value="${PER.ini||''}" min="${minDia()}" max="${hojeBRT()}" onchange="setPerData('ini',this.value)">
      <span>→</span>
      <input type="date" value="${PER.fim||''}" min="${minDia()}" max="${hojeBRT()}" onchange="setPerData('fim',this.value)">
    </div>`:''}
    ${r?`<span class="fdesc">${dmy(r.ini)} a ${dmy(r.fim)}</span>`:'<span class="fdesc">todo o período</span>'}
  </div>`;
}
function serieDe(escopo, chave){
  const r = rangePer();
  return (DATA.serie||[]).filter(s=>s.escopo===escopo && String(s.chave)===String(chave) && (!r || (s.dia>=r.ini && s.dia<=r.fim)));
}
function totais(rows){
  const t = {vendas:0,arrecadado:0,invest:0,grupo:0,pesquisa:0,webinar:0,elite:0,receita_elite:0,dias:rows.length};
  rows.forEach(s=>{['vendas','arrecadado','invest','grupo','pesquisa','webinar','elite','receita_elite'].forEach(k=>t[k]+=s[k]||0);});
  t.cpa   = t.vendas>0 ? t.invest/t.vendas : null;
  t.roi   = t.invest>0 ? (t.arrecadado+t.receita_elite)/t.invest : null;
  t.roiLt = t.invest>0 ? t.arrecadado/t.invest : null;
  return t;
}
const cpaSerie = rows => rows.filter(s=>(s.vendas||0)>0 && (s.invest||0)>0).map(s=>({dia:s.dia, valor:s.invest/s.vendas}));
const mediaDia = (tot,dias) => dias>0 ? (tot/dias) : 0;

/* ================= gráfico (adaptado da TV) ================= */
function chartSVG(serie, cor, corLinha, corFundo, fmt){
  const W=1000,H=380,PB=44,PT=30,PL=34,PR=34;
  if(!serie.length) return '<svg viewBox="0 0 1000 380"></svg>';
  const max = Math.max(...serie.map(d=>d.valor),1);
  const n = serie.length;
  const x = i => PL + (n===1?((W-PL-PR)/2):(i*(W-PL-PR)/(n-1)));
  const y = v => PT + (H-PT-PB)*(1-v/max);
  const pts = serie.map((d,i)=>[x(i),y(d.valor)]);
  const line = pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area = line + ` L ${pts[n-1][0].toFixed(1)} ${H-PB} L ${pts[0][0].toFixed(1)} ${H-PB} Z`;
  const step = Math.max(1, Math.ceil(n/14));
  const vStep = n>24 ? step : 1;
  const fs = n>24 ? 20 : 24;
  const gid = 'g'+Math.abs(cor.split('').reduce((a,c)=>a+c.charCodeAt(0),0))+n;
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${cor}" stop-opacity=".45"/><stop offset="1" stop-color="${cor}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#${gid})"/>
    <path d="${line}" fill="none" stroke="${corLinha}" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
    ${pts.map((p,i)=>{
      const showV = i%vStep===0 || i===n-1;
      const showD = i%step===0 || i===n-1;
      return `
      <circle cx="${p[0]}" cy="${p[1]}" r="${n>24?5:7}" fill="${corFundo}" stroke="${corLinha}" stroke-width="3.5"/>
      ${showV?`<text x="${p[0]}" y="${p[1]-16}" text-anchor="middle" font-size="${fs}" font-weight="700" fill="#eef3ff" font-family="Archivo">${(fmt||fmtI)(serie[i].valor)}</text>`:''}
      ${showD?`<text x="${p[0]}" y="${H-14}" text-anchor="middle" font-size="18" fill="#7d8cab" font-family="Archivo">${serie[i].dia.slice(8,10)}/${serie[i].dia.slice(5,7)}</text>`:''}`;
    }).join('')}</svg>`;
}
function sparkSVG(vals, cor){
  if(!vals.length) return '';
  const W=110,H=30,max=Math.max(...vals,1);
  const x=i=>vals.length===1?W/2:i*W/(vals.length-1), y=v=>2+(H-4)*(1-v/max);
  const d=vals.map((v,i)=>(i?'L':'M')+x(i).toFixed(1)+' '+y(v).toFixed(1)).join(' ');
  return `<svg class="spark" width="110" height="30" viewBox="0 0 ${W} ${H}"><path d="${d}" fill="none" stroke="${cor}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}

     rastreáveis — UTM não chega no checkout; ranking pelo lado do tráfego) */
  const VAR_NOME = v => v==='quizz' ? 'Quiz' : (/^pv\d+$/.test(v) ? 'Página '+v.slice(2) : v);
  const varAgg = {};
  (DATA.variantes||[]).filter(v=>String(v.funnel_id)===String(ev.funnel_id) && (!r || (v.dia>=r.ini && v.dia<=r.fim)))
    .forEach(v=>{
      const a = varAgg[v.variant] = varAgg[v.variant]||{gasto:0,impressoes:0,cliques:0,compras:0};
      a.gasto+=v.gasto||0; a.impressoes+=v.impressoes||0; a.cliques+=v.cliques||0; a.compras+=v.compras||0;
    });
  const vars = Object.entries(varAgg).map(([variant,a])=>({variant,...a,
    ctr: a.impressoes>0 ? 100*a.cliques/a.impressoes : null,
    cpc: a.cliques>0 ? a.gasto/a.cliques : null,
    cpaMeta: a.compras>0 ? a.gasto/a.compras : null,
    conv: a.cliques>0 && a.compras>0 ? 100*a.compras/a.cliques : null})).sort((a,b)=>b.gasto-a.gasto);
  const totGasto = vars.reduce((s,v)=>s+v.gasto,0);
  const temCompras = vars.some(v=>v.compras>0);
  const bestCtr = vars.length>1 ? Math.max(...vars.filter(v=>v.ctr!=null).map(v=>v.ctr)) : null;
  const bestCpc = vars.length>1 ? Math.min(...vars.filter(v=>v.cpc!=null).map(v=>v.cpc)) : null;
  const bestCpaMeta = temCompras && vars.length>1 ? Math.min(...vars.filter(v=>v.cpaMeta!=null).map(v=>v.cpaMeta)) : null;
  const maisCompras = temCompras ? Math.max(...vars.map(v=>v.compras)) : null;
  const varHTML = vars.length ? `<div class="card"><h3>📄 Páginas · ${temCompras?'conversão':'tráfego'} Meta ${r?'· no período':'· todo o período'}</h3>
    <div class="vwrap"><table class="vtable">
      <tr><th>Página</th><th>Gasto</th><th>% verba</th>${temCompras?'<th>Compras</th><th>CPA</th><th>Conv.</th>':''}<th>Impressões</th><th>Cliques</th><th>CTR</th><th>CPC</th></tr>
      ${vars.map(v=>`<tr>
        <td>${esc(VAR_NOME(v.variant))}${temCompras&&v.compras===maisCompras&&v.compras>0?'<span class="vtag top">mais compras</span>':''}${!temCompras&&v.ctr===bestCtr?'<span class="vtag top">melhor CTR</span>':''}${!temCompras&&v.cpc===bestCpc?'<span class="vtag top">menor CPC</span>':''}${temCompras&&v.cpaMeta===bestCpaMeta&&v.cpaMeta!=null?'<span class="vtag top">melhor CPA</span>':''}</td>
        <td>${fmtRk(v.gasto)}</td>
        <td>${totGasto>0?pct(v.gasto,totGasto):'—'}</td>
        ${temCompras?`
        <td class="${v.compras===maisCompras&&v.compras>0?'good':''}">${fmtI(v.compras)}</td>
        <td class="${v.cpaMeta===bestCpaMeta&&v.cpaMeta!=null?'good':''}">${v.cpaMeta!=null?fmtR(v.cpaMeta):'—'}</td>
        <td>${v.conv!=null?v.conv.toLocaleString('pt-BR',{maximumFractionDigits:2})+'%':'—'}</td>`:''}
        <td>${fmtI(v.impressoes)}</td>
        <td>${fmtI(v.cliques)}</td>
        <td class="${v.ctr===bestCtr?'good':''}">${v.ctr!=null?v.ctr.toLocaleString('pt-BR',{maximumFractionDigits:2})+'%':'—'}</td>
        <td class="${v.cpc===bestCpc?'good':''}">${v.cpc!=null?fmtR(v.cpc):'—'}</td>
      </tr>`).join('')}
    </table></div>
    <div class="cpa-note">${temCompras
      ?'ℹ Compras e CPA segundo a atribuição da Meta (pixel) — bom para comparar páginas entre si; o total oficial de vendas é o da Hubla.'
      :'ℹ Ranking pelo tráfego (Meta). As compras por página aparecem aqui automaticamente assim que a carga do Meta passar a enviar o campo de conversões (ajuste no fluxo n8n).'}</div>
  </div>` : '';

  // CPA: só dias FECHADOS entram na linha — o gasto do Meta chega em cargas
  // periódicas e o dia corrente ficaria com CPA artificialmente baixo.
  const hj = hojeBRT();
  const rowsFech = rows.filter(s=>s.dia<hj);
  const cpaRows = cpaSerie(rowsFech);
  const tFech = totais(rowsFech);
  const cpaHj = cpaSerie(rows.filter(s=>s.dia===hj))[0];

  $('main').innerHTML = `<div class="det evento">
    <div class="det-hero evento"><h1>🎟 ${esc(ev.funnel_name)}</h1>
      <div class="sub">Evento ao vivo · o retorno completo vem na ascensão ao Elite após o webinário</div></div>
    ${filtroHTML()}
    <div class="kgrid">${kpis}</div>
    <div class="card"><h3>Ingressos dia a dia · ${r?'no período':'todo o período'}</h3>
      <div class="chart-scroll">${chartSVG(rows.map(d=>({dia:d.dia,valor:d.vendas||0})),'#ff8a3d','#ffab6b','#140b09')}</div></div>
    <div class="card"><h3>🎯 CPA por ingresso dia a dia · dias fechados ${tFech.cpa!=null?'· médio '+fmtR(tFech.cpa):''}</h3>
      <div class="chart-scroll">${chartSVG(cpaRows,'#ffb020','#ffcc4d','#140b09',v=>'R$'+Math.round(v))}</div>
      ${cpaHj?`<div class="cpa-note">⚠ Hoje (parcial): ${fmtR(cpaHj.valor)} — o gasto do Meta é carregado em sincronizações periódicas, então o CPA de hoje ainda vai subir. O dia entra na linha quando fechar.</div>`:''}</div>
    ${varHTML}
    ${r?'':`<div><h2 class="sec">📅 Semana atual</h2><div class="wgrid">
      <div class="wcard" style="--ac:var(--orange)"><span class="k">Ingressos</span><span class="v" style="color:var(--orange)">${fmtI(evw.ingressos_semana)}</span></div>
      <div class="wcard" style="--ac:var(--green)"><span class="k">Arrecadado</span><span class="v" style="color:var(--green)">${fmtRk(evw.arrecadado_semana)}</span></div>
      <div class="wcard" style="--ac:var(--amber)"><span class="k">Investido</span><span class="v" style="color:var(--amber)">${fmtRk(evw.invest_semana)}</span></div>
      <div class="wcard" style="--ac:var(--orange)"><span class="k">Acumulado</span><span class="v">${fmtI(ev.lt_acum)}</span></div>
      <div class="wcard" style="--ac:${roiCol(roiL)}"><span class="k">ROI ingressos</span><span class="v" style="color:${roiCol(roiL)}">${fmtX(roiL)}</span></div>
    </div></div>`}
    ${feedHTML(feed,'Ingressos vendidos')}
  </div>`;
}

/* ================= router ================= */
function route(){
  if(!DATA) return;
  const h = location.hash || '#/';
  const m = h.match(/^#\/f\/(p|e)-(.+)$/);
  $('back').classList.toggle('show', !!m);
  window.scrollTo(0,0);
  if(!m){ renderHome(); return; }
  if(m[1]==='p') renderPerpetuo(decodeURIComponent(m[2]));
  else renderEvento(decodeURIComponent(m[2]));
}
window.addEventListener('hashchange', route);
$('back').addEventListener('click', ()=>{location.hash='#/';});
$('home-link').addEventListener('click', e=>{e.preventDefault();location.hash='#/';});

}

async function fetchData(manual){
  if(manual) $('refresh').classList.add('spin');
  try{
    if(DEMO){ DATA = DEMO_DATA; }
    else{
      if(!KEY){ $('overlay').classList.add('show'); return; }
      const r = await fetch(`${API}?k=${encodeURIComponent(KEY)}`, {cache:'no-store'});
      if(!r.ok) throw new Error('HTTP '+r.status);
      DATA = await r.json();
    }
    lastOk = Date.now();
    $('overlay').classList.remove('show');
    $('sdot').classList.remove('err');
    tickUpd();
    route();
  }catch(e){
    if(!DATA){
      $('overlay-msg').textContent = 'Não foi possível carregar ('+e.message+'). Verifique a conexão ou a chave de acesso.';
      $('overlay').classList.add('show');
    }else{
      $('sdot').classList.add('err');
      $('upd').textContent = 'sem conexão';
    }
  }finally{
    $('refresh').classList.remove('spin');
  }
}
$('refresh').addEventListener('click', ()=>fetchData(true));
fetchData();
setInterval(fetchData, FETCH_MS);
